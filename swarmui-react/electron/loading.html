<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Loading SwarmUI React</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .loading-container {
      background: linear-gradient(135deg, #eb8034 0%, #d6722b 100%);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 400px;
      color: white;
    }

    .logo {
      font-size: 42px;
      font-weight: bold;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 20px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .progress-text {
      font-size: 16px;
      margin-top: 20px;
      opacity: 0.9;
      min-height: 24px;
    }

    .version {
      font-size: 12px;
      margin-top: 15px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="loading-container">
    <div class="logo">SwarmUI</div>
    <div class="subtitle">React Interface</div>
    <div class="spinner"></div>
    <div class="progress-text" id="progress">Starting up...</div>
    <div class="version">Desktop v1.0.0</div>
  </div>

  <script>
    if (window.loadingBridge?.onProgress) {
      window.loadingBridge.onProgress((message) => {
        document.getElementById('progress').textContent = message;
      });
    }
  </script>
</body>
</html>
